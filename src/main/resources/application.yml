spring:
  application:
    name: "Egobook_BE"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL JDBC 드라이버 클래스 이름

  jpa:
    database: mysql # 사용할 데이터베이스 유형 지정 (MySQL)
    database-platform: org.hibernate.dialect.MySQLDialect # Hibernate에서 사용할 MySQL 방언(dialect) 설정
    show-sql: true # 실행된 SQL 쿼리를 콘솔에 출력할지 여부 설정
    properties:
      hibernate:
        format_sql: true # 출력되는 SQL 쿼리를 보기 좋게 포맷팅
  # AWS S3 설정
  cloud:
    aws:
      region:
        static: ap-northeast-2
      s3:
        bucket: egobook-${spring.profiles.active} # profiles.active대로 버킷 이름 설정되도록 함

server:
  servlet:
    session:
      timeout: 30m  # 세션 유효 시간(기본값: 30분). 30분 동안 활동 없으면 삭제됨
      cookie:
        max-age: 1800     # 쿠키 유효 시간 (초 단위). 보통 timeout과 맞춤
        http-only: true   # js로 쿠키 접근 불가하도록 하는 설정
        # secure: false     # 로컬 개발(http)이므로 false. 배포(https) 시 true로 변경
        # -> secure 설정은 환경마다 다르므로 여기서 뺀다.

# swagger 설정
springdoc:
  swagger-ui:
    path: /swagger-ui # Swagger UI 웹페이지가 열리는 경로를 지정함 (기본값 : /swagger-ui/index.html)
    display-request-duration: true # Swagger UI 화면에서 API 요청이 얼마나 걸렸는지 보여줌(응답시간, ms단위)
    tags-sorter: alpha # Swagger UI에서 컨트롤러/태그 그룹 순서를 어떻게 정렬할지 지정 (alpha : 알파벳 순서)
    operations-sorter: method # 한 컨트롤러 안에서 엔드포인트(API) 목록 정렬 방식을 지정함 => method: HTTP 메서드 순서(GET, POST, PUT, DELETE)로 정렬
  api-docs:
    path: /v3/api-docs # OpenAPI JSON 문서가 노출되는 엔드포인트. (기본값도 /v3/api-docs임) => 브라우저/REST 클라이언트에서 접근하면 전체 API 스펙(JSON) 확인 가능함

jwt:
  # 30분 (1000 * 60 * 30)
  access-token-validity-in-ms: 1800000
  # 3개월 (1000 * 60 * 60 * 24 * 90)
  refresh-token-validity-in-ms: 7776000000
  # 100년 = 100 * 365 * 24 * 60 * 60 * 1000 = 3153600000000 ms
  recover-token-validity-in-ms: 3153600000000


# health check 설정
management:
  endpoints:
    web:
      base-path: /manage # 기본값(/actuator)을 /manage로 변경. /actuator는 기본값이라 유추당할 수 있음
